<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ryan Cafe ☕</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f2eb;
      text-align: center;
      padding: 40px;
    }
    
    h1 {
      color: #6b4f3b;
    }
    
    .menu {
      background: white;
      border-radius: 16px;
      padding: 10px 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .menu-item {
      display: flex;
      align-items: center;   /* ✅ 垂直居中 */
      gap: 15px;
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
    }
    
    .menu-item:last-child {
      border-bottom: none;
    }
    
    .menu-item img {
      width: 80px;          /* ✅ 缩小50% */
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
    }
    
    .info {
      flex: 1;
      text-align: left;
    }
    
    .name {
      font-size: 22px;      /* ✅ 放大字体 */
      font-weight: 600;
      color: #4b3b2b;
    }
    
    .info p {
      font-size: 16px;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h1>☕ Ryan Cafe</h1>

<div class="menu">

  <div class="item">
    <img src="images/caramel-latte.jpg">
    <div class="info">
      <div class="name">焦糖咖啡拿铁 【冷】</div>
    </div>
  </div>

  <div class="item">
    <img src="images/Coconut-Latte.jpg">
    <div class="info">
      <div class="name">生椰拿铁 【冷】</div>
    </div>
  </div>

  <div class="item">
    <img src="images/Salted Macha Latte-Cold.jpg">
    <div class="info">
      <div class="name">海盐抹茶奶盖拿铁 【冷】</div>
    </div>
  </div>

  <div class="item">
    <img src="images/latte.jpg">
    <div class="info">
      <div class="name">拿铁【热】</div>
    </div>
  </div>

</div>

</body>
</html>
