<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ryan Cafe ☕</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f2eb;
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #6b4f3b;
    }
    .menu {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>☕ Ryan Cafe</h1>

<div class="menu">
  <div class="item"><span>Latte</span><span>$5</span></div>
  <div class="item"><span>Americano</span><span>$4</span></div>
  <div class="item"><span>Matcha Latte</span><span>$6</span></div>
  <div class="item"><span>Mocha</span><span>$6</span></div>
</div>

</body>
</html>
